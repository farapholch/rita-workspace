name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) kräver npm >= 11.5.1
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Ingen NODE_AUTH_TOKEN behövs — autentisering sker via OIDC
      # (Trusted Publisher konfigurerad på npmjs.com). Provenance är automatiskt.
      - name: Publish to npm
        run: npm publish --access public
