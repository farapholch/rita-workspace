name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # Ingen registry-url: den får setup-node att skriva en .npmrc med
      # _authToken-platshållare, vilket gör att npm försöker token-auth i
      # stället för OIDC. Utan den autentiserar npm via Trusted Publishing.
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Trusted Publishing (OIDC) kräver npm >= 11.5.1
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          echo "npm-version efter uppgradering: $(npm -v)"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Diagnostik: verifiera npm-version, registry och OIDC-env inför OIDC-publicering
      - name: Diagnostik OIDC
        run: |
          echo "npm:      $(npm -v)"
          echo "node:     $(node -v)"
          echo "registry: $(npm config get registry)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL satt: ${ACTIONS_ID_TOKEN_REQUEST_URL:+ja}"

      # Ingen NODE_AUTH_TOKEN behövs — autentisering sker via OIDC
      # (Trusted Publisher konfigurerad på npmjs.com). Provenance är automatiskt.
      - name: Publish to npm
        run: npm publish --access public --loglevel verbose
